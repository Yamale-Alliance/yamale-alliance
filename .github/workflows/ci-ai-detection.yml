name: AI detection regression

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ai-detection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run retrieval detection checks
        run: node scripts/test-ai-detection.mjs
